<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #header {
            padding: 1rem 1.5rem;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #header h1 { font-size: 1.2rem; color: #e94560; }
        #session-info { font-size: 0.85rem; color: #aaa; }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #0f3460;
        }
        .message.agent {
            align-self: flex-start;
            background: #16213e;
            border: 1px solid #0f3460;
        }
        .message.thinking {
            align-self: flex-start;
            background: #1a1a2e;
            border: 1px dashed #533483;
            color: #a0a0c0;
            font-style: italic;
        }
        .message.tool-call {
            align-self: flex-start;
            background: #2d1b4e;
            border: 1px solid #533483;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .message.tool-result {
            align-self: flex-start;
            background: #1e3a2f;
            border: 1px solid #2d6a4f;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .message .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
            opacity: 0.7;
        }
        #input-area {
            padding: 1rem 1.5rem;
            background: #16213e;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 0.5rem;
        }
        #message-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #0f3460;
            border-radius: 0.5rem;
            background: #1a1a2e;
            color: #eee;
            font-size: 1rem;
            outline: none;
        }
        #message-input:focus { border-color: #e94560; }
        #send-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            background: #e94560;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        #send-btn:hover { opacity: 0.9; }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #cancelButton {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            background: #533483;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
            display: none;
        }
        #cancelButton:hover { opacity: 0.9; }
        #status {
            padding: 0.5rem 1.5rem;
            font-size: 0.8rem;
            color: #888;
            background: #16213e;
        }
        #permission-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #permission-modal.active { display: flex; }
        .modal-content {
            background: #16213e;
            padding: 1.5rem;
            border-radius: 0.75rem;
            border: 1px solid #0f3460;
            max-width: 400px;
            width: 90%;
        }
        .modal-content h3 { margin-bottom: 1rem; color: #e94560; }
        .modal-content p { margin-bottom: 1rem; line-height: 1.5; }
        .modal-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }
        .modal-buttons button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-deny { background: #533483; color: white; }
        .btn-allow { background: #2d6a4f; color: white; }
    </style>
</head>
<body>
    <div id="header">
        <h1>Little Agent</h1>
        <div id="session-info">No session</div>
    </div>
    <div id="chat-container"></div>
    <div id="status">Disconnected</div>
    <div id="input-area">
        <input type="text" id="message-input" placeholder="Type a message..." disabled>
        <button id="send-btn" disabled>Send</button>
        <button id="cancelButton">Cancel</button>
    </div>
    <div id="permission-modal">
        <div class="modal-content">
            <h3>Permission Request</h3>
            <p id="permission-text"></p>
            <div class="modal-buttons">
                <button class="btn-deny" id="perm-deny">Deny</button>
                <button class="btn-allow" id="perm-allow">Allow</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
