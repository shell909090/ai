<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header">
        <h1>Little Agent</h1>
        <div id="session-info">No session</div>
    </div>
    <div id="main-area">
        <div id="session-sidebar">
            <div id="sidebar-toolbar">
                <button class="sidebar-btn" id="new-session-btn" aria-label="New session">New</button>
                <button class="sidebar-btn" id="fork-session-btn" aria-label="Fork session">Fork</button>
                <button class="sidebar-btn danger" id="delete-session-btn" aria-label="Delete session">Delete</button>
            </div>
            <div id="session-list"></div>
        </div>
        <div id="chat-area">
            <div id="chat-container"></div>
            <div id="status">Disconnected</div>
            <div id="input-area">
                <input type="text" id="message-input" placeholder="Type a message..." disabled aria-label="Message input">
                <button id="send-btn" disabled>Send</button>
                <div id="spinner"></div>
                <button id="cancelButton">Cancel</button>
            </div>
        </div>
    </div>
    <div id="permission-modal">
        <div class="modal-content">
            <h3>Permission Request</h3>
            <p id="permission-text"></p>
            <div class="modal-buttons">
                <button class="btn-deny" id="perm-deny" aria-label="Deny permission">Deny</button>
                <button class="btn-allow" id="perm-allow" aria-label="Allow permission">Allow</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
